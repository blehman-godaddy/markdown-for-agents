# markdown-for-agents.conf — Apache configuration for Accept: text/markdown negotiation
#
# Enables automatic HTML-to-Markdown conversion when clients send
# Accept: text/markdown. Zero overhead for normal requests.
#
# Requires: mod_ext_filter, mod_setenvif, mod_headers

# 1. Detect Accept: text/markdown → set environment variable
SetEnvIfNoCase Accept "text/markdown" WANTS_MARKDOWN

# 2. Define the external filter (only executes when WANTS_MARKDOWN is set + response is text/html)
ExtFilterDefine html2md \
    mode=output \
    intype=text/html \
    outtype=text/markdown \
    enableenv=WANTS_MARKDOWN \
    cmd="/opt/markdown-for-agents/bin/html2markdown-wrapper.sh"

# 3. Insert filter into output chain
#    - AddOutputFilterByType doesn't work with mod_ext_filter on cPanel (BYTYPE: prefix bug)
#    - AddOutputFilter with extensions misses CMS/proxy URLs without extensions
#    - Use both: extensions for static files, <If> for proxied PHP (WordPress etc.)
AddOutputFilter html2md .html .htm .shtml
<If "%{HTTP:Accept} =~ m|text/markdown|">
    SetOutputFilter html2md
</If>

# 4. Response headers for markdown responses
Header merge Vary "Accept"
Header set Content-Type "text/markdown; charset=utf-8" env=WANTS_MARKDOWN
Header set x-markdown-tokens "body-embedded" env=WANTS_MARKDOWN
Header set x-markdown-converter "markdown-for-agents/0.1.2" env=WANTS_MARKDOWN
