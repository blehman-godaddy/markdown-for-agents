# markdown-for-agents-account.conf — Per-account filter activation template
#
# Copy this into cPanel userdata includes to enable markdown conversion for an account:
#   /etc/apache2/conf.d/userdata/std/2_4/<username>/markdown-for-agents.conf
#   /etc/apache2/conf.d/userdata/ssl/2_4/<username>/markdown-for-agents.conf
#
# Requires: markdown-for-agents-global.conf installed in conf.d/

SetEnvIfNoCase Accept "text/markdown" WANTS_MARKDOWN
AddOutputFilter html2md .html .htm .shtml
<If "%{HTTP:Accept} =~ m|text/markdown|">
    SetOutputFilter html2md
</If>
Header merge Vary "Accept"
Header set Content-Type "text/markdown; charset=utf-8" env=WANTS_MARKDOWN
Header set x-markdown-tokens "body-embedded" env=WANTS_MARKDOWN
Header set x-markdown-converter "markdown-for-agents/__VERSION__" env=WANTS_MARKDOWN
