# markdown-for-agents-global.conf — Global filter definition (server config context)
#
# ExtFilterDefine MUST be in server config context — it cannot go inside
# <VirtualHost> blocks. This file is installed once by the WHM admin.
#
# Per-account activation is handled separately via cPanel userdata includes.
#
# Requires: mod_ext_filter (loaded by 850-markdown-for-agents.conf)

ExtFilterDefine html2md \
    mode=output \
    intype=text/html \
    outtype=text/markdown \
    enableenv=WANTS_MARKDOWN \
    cmd="/opt/markdown-for-agents/bin/html2markdown-wrapper.sh"
